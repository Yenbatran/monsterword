<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster-Word Game</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            background-color: #f4f9f4; 
            margin: 0; 
            padding: 20px; 
        }
        
        #game-board { 
            width: 100%; 
            max-width: 400px; 
            height: 550px; 
            background-color: #b8e994; 
            border: 4px solid #2c3e50; 
            border-radius: 20px; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
        }

        #start-screen, #end-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            box-sizing: border-box;
            padding: 20px;
        }

        #end-screen {
            z-index: 25;
            display: none;
            text-align: center;
            justify-content: center;
        }

        #total-score-display {
            position: absolute;
            top: 20px;
            font-size: 16px; 
            font-weight: 900;
            color: #d35400;
            background: #fdebd0;
            padding: 4px 14px;
            border-radius: 20px;
            border: 2px solid #e67e22;
            box-shadow: 0 4px 0 rgba(230, 126, 34, 0.5);
            z-index: 2;
        }

        #current-score-display {
            position: absolute;
            top: 55px; 
            font-size: 13px;
            font-weight: bold;
            color: #555; 
            display: none; 
            z-index: 1;
        }

        #login-form {
            display: flex;
            gap: 8px;
            margin-bottom: 5px;
            align-items: center;
        }

        #login-form input {
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #2c3e50;
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            outline: none;
        }
        
        #username { width: 90px; }
        #passcode { width: 60px; }

        #login-btn {
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 900;
            background-color: #f1c40f;
            color: #2c3e50;
            border: 2px solid #2c3e50;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 3px 0 #2c3e50;
            transition: all 0.1s;
        }
        #login-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        #login-error {
            color: #e74c3c;
            font-size: 11px;
            font-weight: bold;
            background-color: #fadbd8;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #e74c3c;
            display: none;
            margin-bottom: 15px;
        }

        .credit-text {
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            color: #7f8c8d;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #progress-bar-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 8px;
            background: rgba(0,0,0,0.1);
            z-index: 15;
            display: none;
        }

        #progress-bar {
            height: 100%;
            width: 100%;
            transition: width 0.3s linear;
        }

        #score-board { 
            display: flex; 
            justify-content: space-between; 
            padding: 14px 15px 10px 15px; 
            font-weight: bold; 
            font-size: 20px; 
            color: #2c3e50; 
            background: rgba(255,255,255,0.9); 
            position: absolute; 
            top: 0; 
            width: 100%; 
            z-index: 10; 
            box-sizing: border-box; 
            border-bottom: 2px solid #2c3e50; 
        }

        #monster {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 60px;
            width: 60px; 
            height: 60px;
            transition: top 0.13s linear; 
            z-index: 5;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.2));
        }

        #speech-bubble {
            display: none;
            position: absolute;
            left: 55px; 
            top: 50%;
            transform: translateY(-50%);
            background: #d4efdf; 
            border: 2px solid #27ae60;
            border-radius: 10px;
            padding: 8px; 
            font-size: 11px; 
            font-weight: bold;
            color: #2c3e50;
            white-space: normal; 
            width: 120px; 
            text-align: center; 
            line-height: 1.4;
            z-index: 10;
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
        }

        #speech-bubble::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 100%;
            transform: translateY(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: transparent #27ae60 transparent transparent;
        }

        #egg-container { 
            position: absolute; 
            bottom: 120px; 
            left: 50%; 
            transform: translateX(-50%); 
            text-align: center; 
            z-index: 4;
            width: 100%;
        }
        #egg { font-size: 50px; margin-bottom: 5px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.15)); }
        
        #word { 
            font-weight: 800; 
            font-size: 14px; 
            background: white; 
            padding: 4px 15px; 
            border-radius: 10px; 
            border: 3px solid #2c3e50; 
            color: #2c3e50; 
            box-shadow: 0 4px 0 rgba(0,0,0,0.1); 
            display: inline-block;
        }

        #answers { 
            position: absolute; 
            bottom: 20px; 
            width: 100%; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 8px; 
            padding: 0 15px; 
            box-sizing: border-box;
        }
        
        button.ans-btn { 
            flex: 1 1 45%; 
            padding: 8px 4px; 
            font-size: 13px; 
            font-weight: bold; 
            border-radius: 10px; 
            border: 2px solid #e74c3c; 
            background-color: #ff7675; 
            color: white; 
            cursor: pointer; 
            box-shadow: 0 3px 0 #c0392b; 
            transition: all 0.1s; 
        }
        button.ans-btn:active { transform: translateY(3px); box-shadow: none; }
        button.ans-btn:disabled { opacity: 0.8; cursor: not-allowed; transform: translateY(3px); box-shadow: none; }

        .highlight-correct {
            background-color: #2ecc71 !important; 
            box-shadow: 0 0 10px #2ecc71, 0 3px 0 #27ae60 !important; 
            color: white !important;
            border-color: #27ae60 !important;
        }

        .mode-btn {
            width: auto; 
            padding: 12px 25px; 
            font-size: 14px; 
            font-weight: 900; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer;
            transition: all 0.1s;
        }
        .mode-btn:active { transform: translateY(3px); box-shadow: none !important; }
        
        .mode-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none !important;
            transform: translateY(3px);
        }

        .small-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            transition: all 0.1s;
        }
        .small-btn:active { transform: translateY(3px); box-shadow: none; }

        .end-bubble {
            background: white;
            border: 3px solid #2c3e50;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            margin-bottom: 15px;
            width: 90%;
            box-sizing: border-box;
        }

        #end-mistakes {
            width: 90%; 
            max-height: 200px; 
            overflow-y: auto; 
            text-align: center; 
            display: none;
        }
        
        .mistake-bubble {
            background-color: #f1c40f;
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            display: block;
            width: 100%;
            box-sizing: border-box;
        }

        .confetti {
            position: absolute;
            width: 8px; height: 16px;
            z-index: 30;
            pointer-events: none;
            border-radius: 2px;
        }

        #ranking-board {
            width: 100%;
            max-width: 400px;
            background: white;
            border: 4px solid #2c3e50;
            border-radius: 16px;
            margin-top: 20px;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        #ranking-board h3 {
            margin-top: 0;
            text-align: center;
            color: #d35400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 2px dashed #ecf0f1;
            font-weight: bold;
            color: #2c3e50;
        }
        .ranking-item:last-child {
            border-bottom: none;
        }
        .rank-name { color: #3498db; }
        .rank-score { color: #e74c3c; }
    </style>
</head>
<body>

<audio id="audio-bgm" src="bgm.mp3" loop preload="auto"></audio>
<audio id="audio-chirp" src="chirp.mp3" preload="auto"></audio>
<audio id="audio-laugh" src="laugh.mp3" preload="auto"></audio>

<div id="game-board">
    <div id="progress-bar-container">
        <div id="progress-bar"></div>
    </div>

    <div id="start-screen">
        <div id="total-score-display">Highest Score: 0</div>
        <div id="current-score-display">Recent Score: 0</div>
        
        <h1 style="color: #2c3e50; margin-top: 45px; margin-bottom: 15px; text-align: center; font-size: 34px; text-transform: uppercase; letter-spacing: 2px;">Monster-Word</h1>
        
        <img src="Your paragraph text.png" alt="Learn & Live English" style="width: 94px; height: 94px; object-fit: contain; margin-bottom: 15px;">

        <div id="login-form">
            <input type="text" id="username" maxlength="10" placeholder="Username">
            <input type="password" id="passcode" maxlength="4" placeholder="Code">
            <button id="login-btn" onclick="handleLogin()">LOGIN</button>
        </div>
        <div id="login-error"></div>

        <div style="display: flex; gap: 15px; margin-top: 10px;">
            <button id="btn-chart" class="mode-btn" disabled onclick="selectMode('chart')" style="background-color: #3498db; box-shadow: 0 4px 0 #2980b9;">CHART</button>
            <button id="btn-scitech" class="mode-btn" disabled onclick="selectMode('scitech')" style="background-color: #2ecc71; box-shadow: 0 4px 0 #27ae60;">SCI-TECH</button>
        </div>

        <div class="credit-text">
            Created by Yenba | Learn & Live English
        </div>
    </div>

    <div id="end-screen">
        <div class="end-bubble">
            <h1 id="end-title" style="color: #e74c3c; margin-top: 0; font-size: 24px;"></h1>
            <p id="end-message" style="font-size: 15px; font-weight: bold; color: #34495e; line-height: 1.5; margin-bottom: 15px;"></p>
            
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="small-btn" onclick="goHome()" style="background-color: #95a5a6;">Trang chủ</button>
                <button class="small-btn" onclick="playAgain()" style="background-color: #3498db;">Chơi lại</button>
            </div>
        </div>

        <div id="end-mistakes">
            <h4 style="margin: 0 0 10px 0; color: #d35400; font-size: 16px;">[Chú ý]</h4>
            <div id="mistakes-list"></div>
        </div>
    </div>

    <div id="score-board">
        <span id="lives">❤️❤️❤️</span>
        <span><span id="score">0</span> 🐥</span>
    </div>

    <div id="monster">
        <div id="speech-bubble"><span id="speech-text"></span></div>
        <svg width="60" height="60" viewBox="0 0 100 100">
            <path d="M 25 50 Q 5 40 10 70" stroke="#ff6b81" stroke-width="7" stroke-linecap="round" fill="none"/>
            <path d="M 75 50 Q 95 40 90 70" stroke="#ff6b81" stroke-width="7" stroke-linecap="round" fill="none"/>
            <path d="M 20 80 L 20 40 C 20 10, 80 10, 80 40 L 80 80 Q 72.5 95 65 80 Q 57.5 65 50 80 Q 42.5 95 35 80 Q 27.5 65 20 80 Z" fill="#ff6b81" />
            <circle cx="35" cy="45" r="5" fill="#2c3e50" />
            <circle cx="65" cy="45" r="5" fill="#2c3e50" />
            <path d="M 44 60 Q 50 66 56 60" stroke="#2c3e50" stroke-width="3" stroke-linecap="round" fill="none"/>
            <polygon points="45,60 47,67 49,62" fill="white" stroke="#2c3e50" stroke-width="1.5" stroke-linejoin="round"/>
            <polygon points="55,60 53,67 51,62" fill="white" stroke="#2c3e50" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
    </div>

    <div id="egg-container">
        <div id="egg">🥚</div>
        <div id="word">...</div>
    </div>
    <div id="answers">
        <button onclick="checkAnswer(0)" id="btn0" class="ans-btn">Đáp án 1</button>
        <button onclick="checkAnswer(1)" id="btn1" class="ans-btn">Đáp án 2</button>
        <button onclick="checkAnswer(2)" id="btn2" class="ans-btn">Đáp án 3</button>
        <button onclick="checkAnswer(3)" id="btn3" class="ans-btn">Đáp án 4</button>
    </div>
</div>

<div id="ranking-board">
    <h3>🏆 Leaderboard 🏆</h3>
    <div id="ranking-list">
        <div style="text-align:center; color:#7f8c8d; font-size: 14px;">Đang tải dữ liệu...</div>
    </div>
</div>
