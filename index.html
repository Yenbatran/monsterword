            align-items: center;

            margin: 0; 
            padding: 20px; 
        }
        
        #game-board { 
            width: 100%; 
            max-width: 400px; 
            height: 550px; 
            background-color: #b8e994; 
            border: 4px solid #2c3e50; 
            border-radius: 20px; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
        }

        #start-screen, #end-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            box-sizing: border-box;
            padding: 20px;
        }

        #end-screen {
            z-index: 25;
            display: none;
            text-align: center;
            justify-content: center;
        }

        #total-score-display {
            position: absolute;
            top: 20px;
            font-size: 16px; 
            font-weight: 900;
            color: #d35400;
            background: #fdebd0;
            padding: 4px 14px;
            border-radius: 20px;
            border: 2px solid #e67e22;
            box-shadow: 0 4px 0 rgba(230, 126, 34, 0.5);
            z-index: 2;
        }

        #current-score-display {
            position: absolute;
            top: 55px; 
            font-size: 13px;
            font-weight: bold;
            color: #555; 
            display: none; 
            z-index: 1;

            align-items: center;

            border: 2px solid #2c3e50;
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            outline: none;

        #username { width: 90px; }
        #passcode { width: 60px; }

        #login-btn {
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 900;
            background-color: #f1c40f;
            color: #2c3e50;
            border: 2px solid #2c3e50;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 3px 0 #2c3e50;
            transition: all 0.1s;
        }
        #login-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        #login-error {
            color: #e74c3c;
            font-size: 11px;
            font-weight: bold;
            background-color: #fadbd8;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #e74c3c;
            display: none;
            margin-bottom: 15px;
        }

        .credit-text {
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            color: #7f8c8d;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #progress-bar-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 8px;
            background: rgba(0,0,0,0.1);
            z-index: 15;
            display: none;
        }

        #progress-bar {
            height: 100%;
            width: 100%;
            transition: width 0.3s linear;
        }

        #score-board { 
            display: flex; 
            justify-content: space-between; 
            padding: 14px 15px 10px 15px; 
            font-weight: bold; 
            font-size: 20px; 
            color: #2c3e50; 
            background: rgba(255,255,255,0.9); 
            position: absolute; 
            top: 0; 
            width: 100%; 
            z-index: 10; 
            box-sizing: border-box; 
            border-bottom: 2px solid #2c3e50; 
        }

        #monster {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 60px;
            width: 60px; 
            height: 60px;
            transition: top 0.158s linear; 
            z-index: 5;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.2));
        }

        #speech-bubble {
            display: none;
            position: absolute;
            left: 55px; 
            top: 50%;
            transform: translateY(-50%);
            background: #d4efdf; 
            border: 2px solid #27ae60;
            border-radius: 10px;
            padding: 8px; 
            font-size: 11px; 
            font-weight: bold;
            color: #2c3e50;
            white-space: normal; 
            width: 120px; 
            text-align: center; 
            line-height: 1.4;
            z-index: 10;
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
        }

        #speech-bubble::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 100%;
            transform: translateY(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: transparent #27ae60 transparent transparent;
        }

        #egg-container { 
            position: absolute; 
            bottom: 120px; 
            left: 50%; 
            transform: translateX(-50%); 
            text-align: center; 
            z-index: 4;
            width: 100%;
        }
        #egg { font-size: 50px; margin-bottom: 5px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.15)); }
        
        #word { 
            font-weight: 800; 
            font-size: 14px; 
            background: white; 
            padding: 4px 15px; 
            border-radius: 10px; 
            border: 3px solid #2c3e50; 
            color: #2c3e50; 
            box-shadow: 0 4px 0 rgba(0,0,0,0.1); 
            display: inline-block;
        }

        #answers { 
            position: absolute; 
            bottom: 20px; 
            width: 100%; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 8px; 
            padding: 0 15px; 
            box-sizing: border-box;
        }
        
        button.ans-btn { 
            flex: 1 1 45%; 
            padding: 8px 4px; 
            font-size: 13px; 
            font-weight: bold; 
            border-radius: 10px; 
            border: 2px solid #e74c3c; 
            background-color: #ff7675; 
            color: white; 
            cursor: pointer; 
            box-shadow: 0 3px 0 #c0392b; 
            transition: all 0.1s; 
        }
        button.ans-btn:active { transform: translateY(3px); box-shadow: none; }
        button.ans-btn:disabled { opacity: 0.8; cursor: not-allowed; transform: translateY(3px); box-shadow: none; }

        .highlight-correct {
            background-color: #2ecc71 !important; 
            box-shadow: 0 0 10px #2ecc71, 0 3px 0 #27ae60 !important; 
            color: white !important;
            border-color: #27ae60 !important;
        }

        .mode-btn {
            width: auto; 
            padding: 12px 25px; 
            font-size: 14px; 
            font-weight: 900; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer;
            transition: all 0.1s;
        }
        .mode-btn:active { transform: translateY(3px); box-shadow: none !important; }
        
        .mode-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none !important;
            transform: translateY(3px);
        }

            padding: 8px 16px;
            font-size: 13px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            transition: all 0.1s;

            background: white;
            border: 3px solid #2c3e50;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            margin-bottom: 15px;
            width: 90%;
            box-sizing: border-box;
        }

        #end-mistakes {
            width: 90%; 
            max-height: 200px; 
            overflow-y: auto; 
            text-align: center; 
            display: none;
        }

            padding: 8px 12px;

            color: #2c3e50;

            font-size: 14px;

            margin-top: 0;
            text-align: center;
            color: #d35400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 2px dashed #ecf0f1;
            font-weight: bold;
            color: #2c3e50;
        }
        .ranking-item:last-child {
            border-bottom: none;
        }

</head>

    const bubbleEl = document.getElementById("speech-bubble");
    const speechTextEl = document.getElementById("speech-text");
    const progressBarContainer = document.getElementById("progress-bar-container");
    const progressBar = document.getElementById("progress-bar");
    const buttons = [
        document.getElementById("btn0"), document.getElementById("btn1"),
        document.getElementById("btn2"), document.getElementById("btn3")
    ];

    const bgmAudio = document.getElementById("audio-bgm");
    const chirpAudio = document.getElementById("audio-chirp");
    const laughAudio = document.getElementById("audio-laugh");

    // Lắng nghe dữ liệu Bảng Xếp Hạng từ Firebase
    db.collection("leaderboard").orderBy("score", "desc").limit(5).onSnapshot((querySnapshot) => {
        let html = "";
        let rank = 1;
        querySnapshot.forEach((doc) => {
            html += `
            <div class="ranking-item">
                <span class="rank-name">#${rank} ${doc.id}</span>
                <span class="rank-score">${doc.data().score} 🐥</span>
            </div>`;
            rank++;
        });
        document.getElementById("ranking-list").innerHTML = html || "<div style='text-align:center; color:#7f8c8d; font-size: 14px;'>Chưa có dữ liệu</div>";
    });

    window.onload = function() {
        let savedUser = localStorage.getItem('monsterWebUser');
        if (savedUser) {
            db.collection("leaderboard").doc(savedUser).get().then((docSnapshot) => {
                if(docSnapshot.exists) {
                    loggedInUser = savedUser;
                    let data = docSnapshot.data();
                    
                    // Lấy lại kỷ lục cũ (hoặc mặc định là 0 nếu chưa có)
                    bestChartScore = data.bestChart || 0;
                    bestSciTechScore = data.bestSciTech || 0;
                    // Phục hồi cho các acc cũ chỉ có field "score" mà chưa tách màn
                    if (!data.bestChart && !data.bestSciTech && data.score) {
                        bestChartScore = data.score; 
                    }

                    document.getElementById("username").value = savedUser;
                    document.getElementById("passcode").value = data.passcode;
                    loginSuccess();
                }
            }).catch(e => console.log("Lỗi tải dữ liệu", e));
        }
    };

    function handleLogin() {
        let uname = document.getElementById("username").value.trim();
        let code = document.getElementById("passcode").value.trim();
        let errorEl = document.getElementById("login-error");

        if(!uname || !code) {
            errorEl.innerText = "Vui lòng nhập Username và Passcode!";
            errorEl.style.display = "block";
            return;
        }

        let userRef = db.collection("leaderboard").doc(uname);
        
        userRef.get().then((docSnapshot) => {
            if(docSnapshot.exists) {
                let data = docSnapshot.data();
                if(data.passcode === code) {
                    loggedInUser = uname;
                    
                    bestChartScore = data.bestChart || 0;
                    bestSciTechScore = data.bestSciTech || 0;
                    if (!data.bestChart && !data.bestSciTech && data.score) {
                        bestChartScore = data.score; 
                    }

                    localStorage.setItem('monsterWebUser', uname);
                    loginSuccess();
                } else {
                    errorEl.innerText = "Username này đã được sử dụng hoặc sai Passcode!";
                    errorEl.style.display = "block";
                }
            } else {
                userRef.set({
                    passcode: code,
                    score: 0,
                    bestChart: 0,
                    bestSciTech: 0
                }).then(() => {
                    loggedInUser = uname;
                    bestChartScore = 0;
                    bestSciTechScore = 0;
                    localStorage.setItem('monsterWebUser', uname);
                    loginSuccess();
                }).catch((error) => {
                    console.error("Lỗi khi tạo user: ", error);
                });
            }
        });
    }

    function loginSuccess() {
        document.getElementById("login-error").style.display = "none";
        
        totalScoreEl.innerText = `Highest Score: ${bestChartScore + bestSciTechScore}`;
        
        let recentScore = recentChartScore + recentSciTechScore;
        if (recentScore > 0) {
            currentScoreEl.innerText = `Recent Score: ${recentScore}`;
            currentScoreEl.style.display = "block";
        }
        
        document.getElementById("btn-chart").disabled = false;
        document.getElementById("btn-scitech").disabled = false;
        
        document.getElementById("username").disabled = true;
        document.getElementById("passcode").disabled = true;
        document.getElementById("login-btn").style.display = "none";
    }

    function updateProgressBar() {
        let currentProgress = vocabulary.reduce((sum, v) => sum + v.correctCount, 0);
        let remainingPercent = 100 - (currentProgress / totalRequiredProgress * 100);
        if(remainingPercent < 0) remainingPercent = 0;
        progressBar.style.width = remainingPercent + "%";
    }

    function selectMode(mode) {
        currentMode = mode;
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("end-screen").style.display = "none";
        document.getElementById("ranking-board").style.display = "none"; 
        
        score = 0;
        lives = 3;
        scoreEl.innerText = score;
        updateLivesUI();
        wrongWordsMap = {};
        lastWordEn = ""; 
        monsterY = 60;
        monsterEl.style.top = monsterY + "px";
        eggEl.innerText = "🥚";
        wordEl.innerText = "...";
        buttons.forEach(btn => {
            btn.style.backgroundColor = "";
            btn.style.borderColor = "#e74c3c";
            btn.classList.remove("highlight-correct");
            btn.disabled = true;
            btn.innerText = "..."; 
        });

        if(mode === 'chart') {
            vocabularyData = chartVocab;
            progressBar.style.backgroundColor = "#3498db"; 
        } else {
            vocabularyData = sciTechVocab;
            progressBar.style.backgroundColor = "#2ecc71"; 
        }

        vocabulary = vocabularyData.map(item => ({
            ...item,
            used: false,
            correctCount: 0
        }));

        totalRequiredProgress = vocabulary.length * 2;
        progressBarContainer.style.display = "block";
        updateProgressBar();

        bgmAudio.volume = 0.3; 
        bgmAudio.play().catch(e => console.log("Can't play audio automatically."));

        showSpeechSequence();
    }

    function showSpeechSequence() {
        bubbleEl.style.display = "block";
        speechTextEl.innerText = "Hehehe!";
        
        setTimeout(() => {
            speechTextEl.innerText = "Những quả trứng này trông ngon quá!";
            setTimeout(() => {
                speechTextEl.innerText = "Nếu muốn cứu chúng thì hãy chọn 1 từ đúng nghĩa!";
                setTimeout(() => {
                    bubbleEl.style.display = "none";
                    nextTurn(); 
                }, 2000);
            }, 2000);
        }, 1000);
    }

    function playSound(audioElement) {
        audioElement.currentTime = 0; 
        audioElement.play().catch(e => console.log("Lỗi phát âm thanh"));
    }

    function updateLivesUI() {
        let hearts = "";
        for(let i = 0; i < lives; i++) hearts += "❤️";
        livesEl.innerText = hearts;
    }

    function getNextWord() {
        let allowedLevels = [1];
        if (score >= 6) allowedLevels.push(2);

        let level2Words = vocabulary.filter(v => v.level === 2);
        let level2UsedCount = level2Words.filter(v => v.used).length;
        if (level2Words.length > 0 && (level2UsedCount / level2Words.length) >= 0.9) {
            allowedLevels.push(3); 
        }

        let candidates = vocabulary.filter(v => allowedLevels.includes(v.level) && v.correctCount < 2 && v.en !== lastWordEn);
        
        if (candidates.length === 0) {
            candidates = vocabulary.filter(v => allowedLevels.includes(v.level) && v.correctCount < 2);
        }

        if (candidates.length === 0) return null; 

        let randomIndex = Math.floor(Math.random() * candidates.length);
        let selectedWord = candidates[randomIndex];
        selectedWord.used = true; 
        lastWordEn = selectedWord.en; 
        
        return selectedWord;
    }

    function nextTurn() {
        isRoundActive = true;
        monsterY = 60;
        monsterEl.style.top = monsterY + "px";
        eggEl.innerText = "🥚";

        buttons.forEach(btn => {
            btn.style.backgroundColor = "";
            btn.style.borderColor = "#e74c3c";
            btn.classList.remove("highlight-correct");
            btn.disabled = false;
            btn.innerText = "..."; 
        });

        currentWordObj = getNextWord();
        
        if (!currentWordObj) {
            clearInterval(gameInterval);
            bgmAudio.pause();
            showEndScreen(true);
            return;
        }

        wordEl.innerText = currentWordObj.en;
        currentCorrectAnswer = currentWordObj.vn;

        let wrongAnswers = [];
        let usedGroups = [currentWordObj.group]; 

        while(wrongAnswers.length < 3) {
            let randomIndex = Math.floor(Math.random() * vocabulary.length);
            let candidate = vocabulary[randomIndex];
            
            if(!usedGroups.includes(candidate.group) && !wrongAnswers.includes(candidate.vn)) {
                wrongAnswers.push(candidate.vn);
                usedGroups.push(candidate.group);
            }
        }

        let answers = [currentCorrectAnswer, ...wrongAnswers].sort(() => Math.random() - 0.5);

        buttons.forEach((btn, index) => {
            btn.innerText = answers[index];
        });

        clearInterval(gameInterval);
        gameInterval = setInterval(moveMonster, 158); 
    }

    function highlightTheCorrectAnswer() {
        buttons.forEach(btn => {
            if (btn.innerText === currentCorrectAnswer) {
                btn.classList.add("highlight-correct");
            }
        });
    }

    function moveMonster() {
        monsterY += 10; 
        monsterEl.style.top = monsterY + "px";

        if (monsterY >= collisionY) {
            clearInterval(gameInterval);
            
            if (isRoundActive) {
                wrongWordsMap[currentWordObj.en] = currentCorrectAnswer;
            }

            isRoundActive = false; 
            eggEl.innerText = "💥"; 
            lives--;
            updateLivesUI();

            buttons.forEach(btn => btn.disabled = true);
            highlightTheCorrectAnswer();
            
            playSound(laughAudio);

            setTimeout(() => {
                if (lives > 0) {
                    nextTurn();
                } else {
                    bgmAudio.pause(); 
                    showEndScreen(false);
                }
            }, 2000);
        }
    }

    function checkAnswer(btnIndex) {
        if (!isRoundActive) return; 
        
        isRoundActive = false; 
        buttons.forEach(b => b.disabled = true);

        let btn = buttons[btnIndex];
        let chosenAnswer = btn.innerText;

        if (chosenAnswer === currentCorrectAnswer) {
            clearInterval(gameInterval);
            eggEl.innerText = "🐣"; 
            
            score++;
            scoreEl.innerText = score;
            currentWordObj.correctCount++;

            // THUẬT TOÁN LƯU ĐIỂM KỶ LỤC TỪNG MÀN
            let isNewRecord = false;
            if (currentMode === 'chart' && score > bestChartScore) {
                bestChartScore = score;
                isNewRecord = true;
            } else if (currentMode === 'scitech' && score > bestSciTechScore) {
                bestSciTechScore = score;
                isNewRecord = true;
            }

            // Chỉ cập nhật lên Cloud nếu người chơi phá kỷ lục cũ của chính họ
            if (loggedInUser && isNewRecord) {
                db.collection("leaderboard").doc(loggedInUser).update({
                    score: bestChartScore + bestSciTechScore,
                    bestChart: bestChartScore,
                    bestSciTech: bestSciTechScore
                });
            }

            updateProgressBar();

            btn.classList.add("highlight-correct");
            playSound(chirpAudio);

            setTimeout(nextTurn, 1000); 
        } else {
            wrongWordsMap[currentWordObj.en] = currentCorrectAnswer;

            btn.style.backgroundColor = "#95a5a6";
            btn.style.borderColor = "#7f8c8d";
            btn.style.color = "#ecf0f1";
            btn.innerText = "❌";

            highlightTheCorrectAnswer();
        }
    }

    function showEndScreen(isWin) {
        progressBarContainer.style.display = "none"; 
        
        // Cập nhật điểm recent cho màn vừa chơi
        if (currentMode === 'chart') {
            recentChartScore = score;
        } else if (currentMode === 'scitech') {
            recentSciTechScore = score;
        }

        const endScreen = document.getElementById('end-screen');
        const endTitle = document.getElementById('end-title');
        const endMessage = document.getElementById('end-message');
        const endMistakes = document.getElementById('end-mistakes');
        const mistakesList = document.getElementById('mistakes-list');
        
        endScreen.style.display = 'flex';
        
        if (isWin) {
            endTitle.innerText = "🎉 CHÚC MỪNG! 🎉";
            endTitle.style.color = "#2ecc71";
            endMessage.innerText = "Bạn đã cứu được hết số gà con 🐥 tuyệt vời quá!";
            endMistakes.style.display = 'none';
            launchConfetti();
        } else {
            endTitle.innerText = "GAME OVER";
            endTitle.style.color = "#e74c3c";
            endMessage.innerHTML = `Bạn đã cứu được <b>${score}</b> 🐥.<br>Hãy chơi lại để cứu hết số gà con nào!`;
            
            const mistakes = Object.keys(wrongWordsMap);
            if (mistakes.length > 0) {
                endMistakes.style.display = 'block';
                mistakesList.innerHTML = mistakes.map(en => `
                    <div class="mistake-bubble">
                        ${en} ➔ ${wrongWordsMap[en]}
                    </div>
                `).join('');
            } else {
                endMistakes.style.display = 'none';
            }
        }
    }

    function goHome() {
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
        document.getElementById('ranking-board').style.display = 'block'; 
        
        // Cập nhật lại UI hiển thị điểm sau khi chơi xong
        totalScoreEl.innerText = `Highest Score: ${bestChartScore + bestSciTechScore}`;
        
        let recentScore = recentChartScore + recentSciTechScore;
        currentScoreEl.innerText = `Recent Score: ${recentScore}`;
        currentScoreEl.style.display = "block";
    }

    function playAgain() {
        selectMode(currentMode);
    }

    function launchConfetti() {
        const container = document.getElementById('game-board');
        const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6', '#e84393'];
        
        for(let i=0; i<80; i++) {
            let conf = document.createElement('div');
            conf.classList.add('confetti');
            conf.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
            
            let startX = Math.random() * 100;
            conf.style.left = startX + '%';
            conf.style.top = '-20px';
            
            let fallDuration = Math.random() * 4 + 6; 
            conf.style.transition = `top ${fallDuration}s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform ${fallDuration}s ease-in-out`;
            
            container.appendChild(conf);
            
            setTimeout(() => {
                conf.style.top = '120%';
                
                let scatterX = (Math.random() - 0.5) * 400; 
                let rotation = Math.random() * 1080; 
                
                conf.style.transform = `rotate(${rotation}deg) translateX(${scatterX}px)`;
            }, 50);

            setTimeout(() => {
                if(conf.parentNode) conf.parentNode.removeChild(conf);
            }, fallDuration * 1000 + 100);
        }
    }
</script>

</body>
</html>
